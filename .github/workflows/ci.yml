name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DD_SITE: datadoghq.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Upload git metadata (Datadog CI)
        if: ${{ secrets.DD_API_KEY != '' }}
        run: pnpm exec datadog-ci git-metadata upload
        continue-on-error: true
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}

      - name: Typecheck
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Upload test results to Datadog
        if: ${{ always() && secrets.DD_API_KEY != '' }}
        run: pnpm exec datadog-ci junit upload --service unified-ai-v1 --tags git.repository_url:${{ github.server_url }}/${{ github.repository }} --report junit.xml
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
